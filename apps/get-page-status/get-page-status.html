<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Page Current Status</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://www.agilent.com/styles/lib-styles.css">
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: var(--agt-background-bg-base-primary);
  color: var(--agt-text-icons-tx-base-title);
  line-height: 1.5;
}

.status-card {
  background-color: var(--agt-background-bg-base-white);
  border: 1px solid var(--agt-utility-navy-grey-300);
  box-shadow: var(--agt-shadow-md);
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
}

.header-bar {
  display: flex;
  align-items: center;
  background-color: var(--agt-background-bg-brand);
  padding: var(--agt-spacing-md) var(--agt-spacing-lg);
  color: var(--agt-background-bg-base-white);
  font-weight: var(--agt-font-weight-bold);
  font-size: var(--agt-font-size-16);
}

.header-bar .logo {
  height: var(--agt-spacing-5xl);
  margin-right: var(--agt-spacing-md);
}

.header-bar .header-title {
  flex: 1;
  font-size: var(--agt-font-size-15, 15px);
}

.content {
  padding: var(--agt-spacing-xl) var(--agt-spacing-2xl);
}

.status-message {
  font-weight: var(--agt-font-weight-semibold);
  margin-bottom: var(--agt-spacing-xl);
  padding: var(--agt-spacing-lg) var(--agt-spacing-xl);
  border-radius: var(--agt-roundness-main);
}

.status-message--loading { color: var(--agt-text-icons-tx-base-second); font-style: italic; background-color: var(--agt-background-bg-base-secondary); }
.status-message--in-review { color: var(--agt-text-icons-tx-warning); background-color: var(--agt-background-bg-warning-light); border: 1px solid var(--agt-utility-yellow-200); }
.status-message--no-review { color: var(--agt-text-icons-tx-success); background-color: var(--agt-background-bg-success-light); border: 1px solid var(--agt-utility-dark-green-300); }
.status-message--complete { color: var(--agt-text-icons-tx-success); background-color: var(--agt-background-bg-success-light); border: 1px solid var(--agt-utility-dark-green-300); }
.status-message--approved { color: var(--agt-text-icons-tx-success); background-color: var(--agt-background-bg-success-light); border: 1px solid var(--agt-utility-dark-green-300); }
.status-message--published { color: var(--agt-text-icons-tx-success); background-color: var(--agt-background-bg-success-light); border: 1px solid var(--agt-utility-dark-green-300); }
.status-message--scheduled { color: var(--agt-text-icons-tx-brand-main); background-color: var(--agt-utility-light-blue-200); border: 1px solid var(--agt-utility-light-blue-300); }
.status-message--changes-requested { color: #e65100; background-color: #fff3e0; border: 1px solid #ffe0b2; }
.status-message--rejected { color: var(--agt-text-icons-tx-error); background-color: var(--agt-background-bg-error-light); border: 1px solid var(--agt-utility-red-300); }
.status-message--error { color: var(--agt-text-icons-tx-error); background-color: var(--agt-background-bg-error-light); border: 1px solid var(--agt-utility-red-300); }

.page-details { margin: var(--agt-spacing-xl) 0; }

.detail-row {
  display: flex;
  padding: var(--agt-spacing-sm) 0;
  border-bottom: 1px solid var(--agt-utility-grey-200);
  font-size: var(--agt-font-size-14);
}

.detail-row:last-child { border-bottom: none; }
.detail-row--full-width { flex-direction: column; }

.detail-row__label {
  font-weight: var(--agt-font-weight-semibold);
  color: var(--agt-text-icons-tx-brand-main);
  min-width: var(--agt-min-max-system-120px);
  flex-shrink: 0;
}

.detail-row__value { color: var(--agt-text-icons-tx-base-title); overflow-wrap: break-word; }
.detail-row__value--warning { color: var(--agt-text-icons-tx-warning); }
.detail-row__value--success { color: var(--agt-text-icons-tx-success); }

.detail-row--full-width .detail-row__value {
  margin-top: var(--agt-spacing-2xs);
  padding: var(--agt-spacing-sm) var(--agt-spacing-lg);
  background-color: var(--agt-background-bg-base-primary);
  border-radius: var(--agt-roundness-main);
  font-style: italic;
}

.actions {
  display: flex;
  gap: var(--agt-spacing-lg);
  margin-top: var(--agt-spacing-2xl);
  padding-top: var(--agt-spacing-xl);
  border-top: 1px solid var(--agt-utility-grey-200);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--agt-spacing-md) var(--agt-spacing-2xl);
  font-size: var(--agt-font-size-14);
  font-weight: var(--agt-font-weight-semibold);
  border-radius: var(--agt-roundness-main);
  cursor: pointer;
  text-decoration: none;
  transition: background-color 0.2s, border-color 0.2s;
  border: none;
  flex: 1;
}

.btn--primary { background-color: var(--agt-background-bg-brand); color: var(--agt-background-bg-base-white); }
.btn--primary:hover:not(:disabled) { background-color: var(--agt-background-bg-brand-hover); }
.btn--secondary { background-color: var(--agt-background-bg-base-white); color: var(--agt-background-bg-brand); border: 1px solid var(--agt-background-bg-brand); }
.btn--secondary:hover { background-color: var(--agt-background-bg-brand-light); }

.notice { text-align: center; padding: var(--agt-spacing-2xl); }

.spinner {
  width: var(--agt-spacing-5xl);
  height: var(--agt-spacing-5xl);
  border: var(--agt-roundness-main) solid var(--agt-utility-grey-400);
  border-top-color: var(--agt-background-bg-brand);
  border-radius: var(--agt-roundness-full);
  animation: spin 1s linear infinite;
  margin: 0 auto var(--agt-spacing-xl);
}

@keyframes spin { to { transform: rotate(360deg); } }

.info-note {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-base-second);
  margin-top: var(--agt-spacing-lg);
  text-align: center;
  padding: var(--agt-spacing-sm);
  background: var(--agt-background-bg-base-secondary);
  border-radius: var(--agt-roundness-main);
}

.status-badge {
  display: inline-block;
  padding: var(--agt-spacing-2xs) var(--agt-spacing-lg);
  border-radius: var(--agt-roundness-secondary);
  font-size: var(--agt-font-size-12);
  font-weight: var(--agt-font-weight-semibold);
  text-transform: uppercase;
}

.status-badge--in-review { background: var(--agt-background-bg-warning-light); color: var(--agt-text-icons-tx-warning); }
.status-badge--no-review { background: var(--agt-background-bg-success-light); color: var(--agt-text-icons-tx-success); }
.status-badge--complete { background: var(--agt-utility-light-blue-200); color: var(--agt-text-icons-tx-base-title); }
.status-badge--approved { background: var(--agt-background-bg-success-light); color: var(--agt-text-icons-tx-success); }
.status-badge--published { background: var(--agt-utility-light-blue-200); color: var(--agt-text-icons-tx-brand-main); }
.status-badge--scheduled { background: var(--agt-utility-light-blue-200); color: var(--agt-text-icons-tx-brand-main); }
.status-badge--changes-requested { background: #fff3e0; color: #e65100; }
.status-badge--rejected { background: var(--agt-background-bg-error-light); color: var(--agt-text-icons-tx-error); }

.char-count { font-size: var(--agt-font-size-12); color: var(--agt-text-icons-tx-base-tertiary); font-weight: normal; }

.issue-item {
  display: inline-block;
  background-color: var(--agt-background-bg-warning-light);
  color: var(--agt-text-icons-tx-warning);
  padding: var(--agt-corner-small) var(--agt-spacing-sm);
  border-radius: var(--agt-corner-small);
  font-size: var(--agt-font-size-12);
  margin: var(--agt-corner-small) var(--agt-spacing-2xs) var(--agt-corner-small) 0;
}

.debug-toggle { font-size: var(--agt-font-size-12); color: var(--agt-text-icons-tx-base-second); cursor: pointer; margin-top: var(--agt-spacing-lg); text-decoration: underline; }

.debug-panel {
  margin-top: var(--agt-spacing-lg);
  padding: var(--agt-spacing-md);
  background: var(--agt-background-bg-warning-on);
  border-radius: var(--agt-roundness-main);
  font-size: var(--agt-font-size-10);
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: var(--agt-min-max-system-160px);
  overflow-y: auto;
  display: none;
}

.debug-panel--visible { display: block; }

.feedback-box {
  margin: var(--agt-spacing-xl) 0;
  padding: var(--agt-spacing-lg) var(--agt-spacing-xl);
  border-radius: var(--agt-roundness-main);
  border-left: 4px solid #e65100;
  background: #fff8f0;
}

.feedback-box--rejected { border-left-color: var(--agt-background-bg-error-main); background: var(--agt-background-bg-error-light); }

.feedback-box__header {
  font-weight: var(--agt-font-weight-bold);
  font-size: var(--agt-font-size-12);
  color: #e65100;
  margin-bottom: var(--agt-spacing-xs);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.feedback-box--rejected .feedback-box__header { color: var(--agt-text-icons-tx-error); }
.feedback-box__text { font-size: var(--agt-font-size-14); color: var(--agt-text-icons-tx-base-title); line-height: 1.6; }

.rejection-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--agt-spacing-2xs);
  padding: var(--agt-corner-small) var(--agt-spacing-sm);
  border-radius: var(--agt-roundness-full);
  font-size: var(--agt-font-size-12);
  font-weight: var(--agt-font-weight-semibold);
  background: var(--agt-background-bg-error-light);
  color: var(--agt-text-icons-tx-error);
  margin-left: var(--agt-spacing-sm);
}

.priority-urgent { color: var(--agt-text-icons-tx-error); font-weight: var(--agt-font-weight-semibold); }
.priority-standard { color: var(--agt-background-bg-brand); font-weight: var(--agt-font-weight-semibold); }
.priority-future-deployment { color: var(--agt-utility-dark-blue-800); font-weight: var(--agt-font-weight-semibold); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
/* eslint-disable no-use-before-define */

const CONFIG = Object.freeze({
  proxyUrl: 'https://23750-539copperbadger.adobeioruntime.net/api/v1/web/default/status-check-proxy',
  defaultRef: 'main',
  logoPath: './assets/agilent-logo.png',
  pluginTitle: 'ContentFlow — Get Page Status',
});

const STATUS = Object.freeze({
  LOADING: 'loading',
  IN_REVIEW: 'in-review',
  APPROVED: 'approved',
  CHANGES_REQUESTED: 'changes-requested',
  REJECTED: 'rejected',
  PUBLISHED: 'published',
  SCHEDULED: 'scheduled',
  COMPLETE: 'complete',
  NO_REVIEW: 'no-review',
  ERROR: 'error',
});

const state = { context: null, debugLogs: [] };

function log(message, data = null) {
  const timestamp = new Date().toISOString().slice(11, 19);
  const logEntry = data ? `[${timestamp}] ${message}: ${JSON.stringify(data).slice(0, 200)}` : `[${timestamp}] ${message}`;
  console.log(`[GPS ${timestamp}]`, message, data || '');
  state.debugLogs.push(logEntry);
}

function formatDate(isoString) {
  try { return new Date(isoString).toLocaleString(); } catch { return isoString; }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function normalizePath(path) {
  return path.replace(/^\/+/, '').replace(/\.html?$/, '').replace(/\/index$/, '') || 'index';
}

function isIndexPage(path) {
  const normalized = normalizePath(path);
  return normalized === 'index' || normalized === '';
}

function buildUrlPath(path) {
  return isIndexPage(path) ? '/' : `/${normalizePath(path)}`;
}

function normalizeStatus(raw) {
  if (!raw || typeof raw !== 'string') return 'none';
  const s = raw.toLowerCase().trim().replace(/[\s_]+/g, '-');
  if (s === 'rejected' || s === 'not-relevant') return 'rejected';
  if (s.includes('changes')) return 'changes-requested';
  if (s === 'approved') return 'approved';
  if (s === 'in-review') return 'in-review';
  if (s === 'published') return 'published';
  if (s === 'scheduled') return 'scheduled';
  if (s === 'complete') return 'complete';
  if (s === 'authoring' || s === 'draft') return 'authoring';
  if (s && s !== 'none') console.warn('[GPS] Unexpected status value:', raw, '→', s);
  return 'none';
}

function getStatusLabel(status) {
  const map = { authoring: 'Authoring', 'in-review': 'In Review', approved: 'Approved', 'changes-requested': 'Changes Requested', rejected: 'Not Relevant', published: 'Published', scheduled: 'Scheduled', complete: 'Complete' };
  return map[status] || status || 'Unknown';
}

function cleanFeedback(text) {
  if (!text) return '';
  return text.replace(/^Proof Comment:\s*/i, '').trim();
}

async function checkReviewStatus(ctx) {
  log('Checking review status via proxy');
  try {
    const response = await fetch(CONFIG.proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { action: 'check-status', pageIdentifier: ctx.pageIdentifier, org: ctx.org, site: ctx.site, ref: ctx.ref, path: ctx.path } }),
    });
    if (!response.ok) { log('Status check failed', { status: response.status }); return null; }
    const data = await response.json();
    log('Status response', data);
    if (data.message && typeof data.message === 'string') {
      try {
        const fixedMessage = data.message.replace(/"status":\s*([a-zA-Z-]+),/g, '"status": "$1",');
        const parsedMessage = JSON.parse(fixedMessage);
        log('Parsed message from response', parsedMessage);
        return parsedMessage;
      } catch (parseError) {
        log('Failed to parse message field', parseError.message);
        return data;
      }
    }
    return data;
  } catch (error) {
    log('Status check error', error.message);
    return null;
  }
}

function getContextFromURLParams() {
  const params = new URLSearchParams(window.location.search);
  const ctx = { ref: params.get('ref') || '', site: params.get('site') || params.get('repo') || '', org: params.get('org') || params.get('owner') || '', path: params.get('path') || '' };
  log('URL params context', ctx);
  return ctx;
}

function getContextFromReferrer() {
  if (!document.referrer) return null;
  try {
    const url = new URL(document.referrer);
    log('Referrer URL', document.referrer);
    const daMatch = url.href.match(/da\.live\/edit#\/([^/]+)\/([^/]+)\/(.*)?/);
    if (daMatch) return { org: daMatch[1], site: daMatch[2], path: daMatch[3] || 'index', ref: 'main', source: 'da.live-referrer' };
    const aemMatch = url.host.match(/^([^-]+)--([^-]+)--([^.]+)\.aem\.(page|live)$/);
    if (aemMatch) return { ref: aemMatch[1], site: aemMatch[2], org: aemMatch[3], path: url.pathname.replace(/^\//, '') || 'index', source: 'aem-referrer' };
  } catch (error) { log('Referrer parse error', error.message); }
  return null;
}

async function getContextFromDASDK() {
  try {
    const DA_SDK = await import('https://da.live/nx/utils/sdk.js');
    const sdk = await DA_SDK.default;
    log('DA SDK raw context', sdk?.context);
    if (sdk?.context) {
      return { org: sdk.context.org || sdk.context.owner || '', site: sdk.context.repo || '', ref: sdk.context.ref || 'main', path: sdk.context.path || '', source: 'da-sdk' };
    }
  } catch (error) { log('DA SDK error', error.message); }
  return null;
}

async function getFullContext() {
  const urlParams = getContextFromURLParams();
  const referrerCtx = getContextFromReferrer();
  const sdkCtx = await getContextFromDASDK();
  log('Context sources', { urlParams, referrerCtx, sdkCtx });

  let path = sdkCtx?.path || referrerCtx?.path || urlParams.path || '';
  if (!path) path = 'index';
  if (path.includes('tools/') || path.includes('get-page-status')) {
    log('Path contains plugin path, falling back', { originalPath: path });
    path = referrerCtx?.path || urlParams.path || 'index';
  }
  path = normalizePath(path);
  log('Final path after normalization', path);

  const ctx = {
    ref: sdkCtx?.ref || referrerCtx?.ref || urlParams.ref || CONFIG.defaultRef,
    site: sdkCtx?.site || referrerCtx?.site || urlParams.site || '',
    org: sdkCtx?.org || referrerCtx?.org || urlParams.org || '',
    path,
    source: sdkCtx?.source || referrerCtx?.source || 'url-params',
  };

  const urlPath = buildUrlPath(ctx.path);
  ctx.previewUrl = `https://${ctx.ref}--${ctx.site}--${ctx.org}.aem.page${urlPath}`;
  ctx.liveUrl = `https://${ctx.ref}--${ctx.site}--${ctx.org}.aem.live${urlPath}`;
  ctx.pageIdentifier = `${ctx.org}/${ctx.site}/${ctx.path}`;
  log('Final context', ctx);
  return ctx;
}

function getPriorityClass(priority) {
  if (!priority) return '';
  return `priority-${priority.toLowerCase().replace(/\s+/g, '-')}`;
}

function renderPriority(priority) {
  if (!priority) return '';
  return `<span class="${getPriorityClass(priority)}">${escapeHtml(priority)}</span>`;
}

function renderHeader() {
  const logoHtml = CONFIG.logoPath
    ? `<img src="${CONFIG.logoPath}" alt="Agilent Logo" class="logo" onerror="this.style.display='none'" />`
    : '';
  return `<div class="header-bar">${logoHtml}<span class="header-title">${CONFIG.pluginTitle}</span></div>`;
}

function renderLoading(message) {
  return `<div class="notice"><div class="spinner"></div><p class="status-message status-message--loading">${escapeHtml(message)}</p></div>`;
}

function renderError(message) {
  return `<div class="notice"><p class="status-message status-message--error">${escapeHtml(message)}</p><button id="retry-btn" class="btn btn--primary" style="margin-top:12px;">Retry</button><div class="debug-toggle" id="debug-toggle">Show debug info</div><div class="debug-panel" id="debug-panel"></div></div>`;
}

function renderInReview(data) {
  const ctx = state.context;
  const seoTitle = data.seo?.title?.content || data.title || '';
  const seoTitleLength = data.seo?.title?.length || seoTitle.length || 0;
  const seoDescription = data.seo?.metaDescription?.content || '';
  const seoDescLength = data.seo?.metaDescription?.length || 0;
  const reviewerName = data.reviewerName || 'Reviewer';
  return `
    <p class="status-message status-message--in-review">Page is in review by ${escapeHtml(reviewerName)}.</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--in-review">In Review</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Title:</span><span class="detail-row__value">${escapeHtml(seoTitle || ctx.path)} <span class="char-count">(${seoTitleLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Page Path:</span><span class="detail-row__value">${escapeHtml(data.name || ctx.path)}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Description:</span><span class="detail-row__value">${seoDescription ? escapeHtml(seoDescription) : '<em>No description</em>'} <span class="char-count">(${seoDescLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(data.submittedBy || 'Unknown')}</span></div>
      <div class="detail-row"><span class="detail-row__label">Submission Date:</span><span class="detail-row__value">${data.submittedDate ? formatDate(data.submittedDate) : 'N/A'}</span></div>
      ${data.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value">${renderPriority(data.priority)}</span></div>` : ''}
      ${data.notes ? `<div class="detail-row detail-row--full-width"><span class="detail-row__label">Notes:</span><span class="detail-row__value">${escapeHtml(data.notes)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--primary">View Preview</a></div>`;
}

function renderComplete(data) {
  const ctx = state.context;
  const seoTitle = data.seo?.title?.content || data.title || '';
  const seoTitleLength = data.seo?.title?.length || seoTitle.length || 0;
  const seoDescription = data.seo?.metaDescription?.content || '';
  const seoDescLength = data.seo?.metaDescription?.length || 0;
  const statusMessage = data.completedDate ? `Page was completed on ${formatDate(data.completedDate)}.` : 'Page has been published.';
  return `
    <p class="status-message status-message--complete">${statusMessage}</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--published">Published</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Title:</span><span class="detail-row__value">${escapeHtml(seoTitle || ctx.path)} <span class="char-count">(${seoTitleLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Page Path:</span><span class="detail-row__value">${escapeHtml(data.name || ctx.path)}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Description:</span><span class="detail-row__value">${seoDescription ? escapeHtml(seoDescription) : '<em>No description</em>'} <span class="char-count">(${seoDescLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(data.submittedBy || 'Unknown')}</span></div>
      <div class="detail-row"><span class="detail-row__label">Completed Date:</span><span class="detail-row__value">${data.completedDate ? formatDate(data.completedDate) : 'N/A'}</span></div>
      ${data.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value">${renderPriority(data.priority)}</span></div>` : ''}
      ${data.notes ? `<div class="detail-row detail-row--full-width"><span class="detail-row__label">Notes:</span><span class="detail-row__value">${escapeHtml(data.notes)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.liveUrl}" target="_blank" class="btn btn--primary">View Live</a></div>
    <p class="info-note">Page is ready for a new review submission if needed.</p>`;
}

function renderApproved(data) {
  const ctx = state.context;
  const reviewerName = data.reviewerName || 'Reviewer';
  const approvedDate = data.lastReviewDate;
  const statusMessage = approvedDate ? `Page was approved on ${formatDate(approvedDate)} by ${escapeHtml(reviewerName)}.` : `Page was approved by ${escapeHtml(reviewerName)}.`;
  return `
    <p class="status-message status-message--approved">${statusMessage}</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--approved">Approved</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Title:</span><span class="detail-row__value">${escapeHtml(data.title || ctx.path)}</span></div>
      ${data.submittedBy ? `<div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(data.submittedBy)}</span></div>` : ''}
      ${data.submittedDate ? `<div class="detail-row"><span class="detail-row__label">Submitted:</span><span class="detail-row__value">${formatDate(data.submittedDate)}</span></div>` : ''}
      ${approvedDate ? `<div class="detail-row"><span class="detail-row__label">Approved On:</span><span class="detail-row__value">${formatDate(approvedDate)}</span></div>` : ''}
      ${data.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value">${renderPriority(data.priority)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--secondary">View Preview</a></div>
    <p class="info-note">Open the &ldquo;Publish Page&rdquo; task in Workfront to publish.</p>`;
}

function renderScheduled(data) {
  const ctx = state.context;
  const reviewerName = data.reviewerName || data.submittedBy || 'System';
  const { scheduledDate } = data;
  const statusMessage = scheduledDate ? `This page is scheduled to be published on ${formatDate(scheduledDate)} by ${escapeHtml(reviewerName)}.` : `This page is scheduled for publishing by ${escapeHtml(reviewerName)}.`;
  return `
    <p class="status-message status-message--scheduled">${statusMessage}</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--scheduled">Scheduled</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Title:</span><span class="detail-row__value">${escapeHtml(data.title || ctx.path)}</span></div>
      ${data.submittedBy ? `<div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(data.submittedBy)}</span></div>` : ''}
      ${scheduledDate ? `<div class="detail-row"><span class="detail-row__label">Scheduled Date:</span><span class="detail-row__value">${formatDate(scheduledDate)}</span></div>` : ''}
      ${data.lastReviewDate ? `<div class="detail-row"><span class="detail-row__label">Approved On:</span><span class="detail-row__value">${formatDate(data.lastReviewDate)}</span></div>` : ''}
      ${data.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value">${renderPriority(data.priority)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--secondary">View Preview</a></div>
    <p class="info-note">Page will be published automatically at the scheduled time.</p>`;
}

function renderChangesRequested(data) {
  const ctx = state.context;
  const feedback = cleanFeedback(data.reviewerFeedback);
  const rejCount = parseInt(data.rejectionCount, 10) || 0;
  const reviewerName = data.reviewerName || 'Reviewer';
  const rejBadgeHtml = rejCount > 0 ? `<span class="rejection-badge">\u21BB ${rejCount} revision${rejCount > 1 ? 's' : ''}</span>` : '';
  return `
    <p class="status-message status-message--changes-requested">Changes were requested by ${escapeHtml(reviewerName)}. Please review the feedback below.</p>
    ${feedback ? `<div class="feedback-box"><div class="feedback-box__header">Reviewer Feedback</div><div class="feedback-box__text">${escapeHtml(feedback)}</div></div>` : ''}
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--changes-requested">Changes Requested</span>${rejBadgeHtml}</span></div>
      <div class="detail-row"><span class="detail-row__label">Title:</span><span class="detail-row__value">${escapeHtml(data.title || ctx.path)}</span></div>
      ${data.submittedBy ? `<div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(data.submittedBy)}</span></div>` : ''}
      ${data.lastReviewDate ? `<div class="detail-row"><span class="detail-row__label">Last Reviewed:</span><span class="detail-row__value">${formatDate(data.lastReviewDate)}</span></div>` : ''}
      ${data.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value">${renderPriority(data.priority)}</span></div>` : ''}
      ${data.notes ? `<div class="detail-row detail-row--full-width"><span class="detail-row__label">Author Notes:</span><span class="detail-row__value">${escapeHtml(data.notes)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--primary">View Preview</a></div>
    <p class="info-note">Make your changes, then use &ldquo;Send For Review&rdquo; to resubmit.</p>`;
}

function renderRejected(data) {
  const ctx = state.context;
  const feedback = cleanFeedback(data.reviewerFeedback);
  return `
    <p class="status-message status-message--rejected">This page was marked as &ldquo;Not Relevant&rdquo; and the project has been closed.</p>
    ${feedback ? `<div class="feedback-box feedback-box--rejected"><div class="feedback-box__header">Reviewer Feedback</div><div class="feedback-box__text">${escapeHtml(feedback)}</div></div>` : ''}
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--rejected">Not Relevant</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Page:</span><span class="detail-row__value">${escapeHtml(ctx.path)}</span></div>
      ${data.lastReviewDate ? `<div class="detail-row"><span class="detail-row__label">Closed On:</span><span class="detail-row__value">${formatDate(data.lastReviewDate)}</span></div>` : ''}
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--secondary">View Preview</a></div>
    <p class="info-note">To resubmit, create a new project via the Product Launch form.</p>`;
}

function renderNoReview() {
  const ctx = state.context;
  return `
    <p class="status-message status-message--no-review">No active review found for this page.</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Page:</span><span class="detail-row__value">${escapeHtml(ctx.pageIdentifier)}</span></div>
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--no-review">No Review</span></span></div>
    </div>
    <div class="actions"><a href="${ctx.previewUrl}" target="_blank" class="btn btn--primary">View Preview</a></div>
    <p class="info-note">Use "Send For Review" to submit this page for review.</p>`;
}

function render(viewState) {
  const app = document.getElementById('app');
  let content = '';
  switch (viewState.status) {
    case STATUS.LOADING: content = renderLoading(viewState.message); break;
    case STATUS.ERROR: content = renderError(viewState.message); break;
    case STATUS.IN_REVIEW: content = renderInReview(viewState.data); break;
    case STATUS.APPROVED: content = renderApproved(viewState.data); break;
    case STATUS.SCHEDULED: content = renderScheduled(viewState.data); break;
    case STATUS.CHANGES_REQUESTED: content = renderChangesRequested(viewState.data); break;
    case STATUS.REJECTED: content = renderRejected(viewState.data); break;
    case STATUS.PUBLISHED:
    case STATUS.COMPLETE: content = renderComplete(viewState.data); break;
    case STATUS.NO_REVIEW: content = renderNoReview(); break;
    default: content = renderError('Unknown state');
  }
  app.innerHTML = `<div class="status-card">${renderHeader()}<div class="content">${content}</div></div>`;
  attachEventListeners();
}

async function init() {
  render({ status: STATUS.LOADING, message: 'Checking page status…' });
  try {
    state.context = await getFullContext();
    if (!state.context.org || !state.context.site) {
      render({ status: STATUS.ERROR, message: 'Could not determine page context. Make sure you have a page open.' });
      return;
    }
    const statusResponse = await checkReviewStatus(state.context);
    if (!statusResponse) {
      render({ status: STATUS.ERROR, message: 'Failed to check status. Please try again.' });
      return;
    }
    const currentStatus = statusResponse.status ? normalizeStatus(statusResponse.status) : 'none';
    log('Normalized status', { raw: statusResponse.status, normalized: currentStatus });
    switch (currentStatus) {
      case 'in-review': render({ status: STATUS.IN_REVIEW, data: statusResponse }); break;
      case 'approved': render({ status: STATUS.APPROVED, data: statusResponse }); break;
      case 'scheduled': render({ status: STATUS.SCHEDULED, data: statusResponse }); break;
      case 'changes-requested': render({ status: STATUS.CHANGES_REQUESTED, data: statusResponse }); break;
      case 'rejected': render({ status: STATUS.REJECTED, data: statusResponse }); break;
      case 'published': render({ status: STATUS.PUBLISHED, data: statusResponse }); break;
      case 'complete': render({ status: STATUS.COMPLETE, data: statusResponse }); break;
      default: render({ status: STATUS.NO_REVIEW }); break;
    }
  } catch (error) {
    log('Init error', error.message);
    render({ status: STATUS.ERROR, message: `Error: ${error.message}` });
  }
}

function attachEventListeners() {
  document.getElementById('retry-btn')?.addEventListener('click', init);
  document.getElementById('debug-toggle')?.addEventListener('click', toggleDebugPanel);
}

function toggleDebugPanel() {
  const panel = document.getElementById('debug-panel');
  if (panel) { panel.classList.toggle('debug-panel--visible'); panel.textContent = state.debugLogs.join('\n'); }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
  </script>
</body>
</html>
