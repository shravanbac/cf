<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send For Review</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://www.agilent.com/styles/lib-styles.css">
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: var(--agt-background-bg-base-primary);
  color: var(--agt-text-icons-tx-base-title);
  line-height: 1.5;
}

.review-card {
  background-color: var(--agt-background-bg-base-white);
  border: 1px solid var(--agt-utility-navy-grey-300);
  box-shadow: var(--agt-shadow-md);
  width: 100%;
  min-height: 100vh;
  overflow: hidden;
}

.header-bar {
  display: flex;
  align-items: center;
  background-color: var(--agt-background-bg-brand);
  padding: var(--agt-spacing-md) var(--agt-spacing-lg);
  color: var(--agt-background-bg-base-white);
  font-weight: var(--agt-font-weight-bold);
  font-size: var(--agt-font-size-16);
}

.header-bar .logo {
  height: var(--agt-spacing-5xl);
  margin-right: var(--agt-spacing-md);
}

.header-bar .header-title {
  flex: 1;
  font-size: var(--agt-font-size-15, 15px);
}

.content {
  padding: var(--agt-spacing-xl) var(--agt-spacing-2xl);
}

.status-message {
  font-weight: var(--agt-font-weight-semibold);
  margin-bottom: var(--agt-spacing-xl);
  padding: var(--agt-spacing-lg) var(--agt-spacing-xl);
  border-radius: var(--agt-roundness-main);
}

.status-message--loading {
  color: var(--agt-text-icons-tx-base-second);
  font-style: italic;
  background-color: var(--agt-background-bg-base-secondary);
}

.status-message--success {
  color: var(--agt-text-icons-tx-success);
  background-color: var(--agt-background-bg-success-light);
  border: 1px solid var(--agt-utility-dark-green-300);
}

.status-message--in-review {
  color: var(--agt-text-icons-tx-warning);
  background-color: var(--agt-background-bg-warning-light);
  border: 1px solid var(--agt-utility-yellow-200);
}

.status-message--published {
  color: var(--agt-text-icons-tx-success);
  background-color: var(--agt-background-bg-success-light);
  border: 1px solid var(--agt-utility-dark-green-300);
}

.status-message--error {
  color: var(--agt-text-icons-tx-error);
  background-color: var(--agt-background-bg-error-light);
  border: 1px solid var(--agt-utility-red-300);
}

.status-message--blocked {
  color: var(--agt-text-icons-tx-warning);
  background-color: var(--agt-background-bg-warning-light);
  border: 1px solid var(--agt-utility-yellow-200);
}

.status-message--approved {
  color: var(--agt-text-icons-tx-success);
  background-color: var(--agt-background-bg-success-light);
  border: 1px solid var(--agt-utility-dark-green-300);
}

.status-message--scheduled {
  color: var(--agt-text-icons-tx-brand-main);
  background-color: var(--agt-utility-light-blue-200);
  border: 1px solid var(--agt-utility-light-blue-300);
}

.status-message--changes-requested {
  color: #e65100;
  background-color: #fff3e0;
  border: 1px solid #ffe0b2;
}

.status-message--rejected {
  color: var(--agt-text-icons-tx-error);
  background-color: var(--agt-background-bg-error-light);
  border: 1px solid var(--agt-utility-red-300);
}

.page-details {
  margin: var(--agt-spacing-xl) 0;
}

.detail-row {
  display: flex;
  padding: var(--agt-spacing-sm) 0;
  border-bottom: 1px solid var(--agt-utility-grey-200);
  font-size: var(--agt-font-size-14);
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-row__label {
  font-weight: var(--agt-font-weight-semibold);
  color: var(--agt-text-icons-tx-brand-main);
  min-width: var(--agt-min-max-system-120px);
  flex-shrink: 0;
}

.detail-row__value {
  color: var(--agt-text-icons-tx-base-title);
  overflow-wrap: break-word;
}

.detail-row__value--warning { color: var(--agt-text-icons-tx-warning); }
.detail-row__value--success { color: var(--agt-text-icons-tx-success); }

.detail-row--full-width .detail-row__value {
  margin-top: var(--agt-spacing-2xs);
  padding: var(--agt-spacing-sm) var(--agt-spacing-lg);
  background-color: var(--agt-background-bg-base-primary);
  border-radius: var(--agt-roundness-main);
  font-style: italic;
}

.form-section {
  margin: var(--agt-spacing-xl) 0;
  padding-top: var(--agt-spacing-xl);
  border-top: 1px solid var(--agt-utility-grey-200);
}

.form-group { margin-bottom: var(--agt-spacing-xl); }
.form-group:last-child { margin-bottom: 0; }

.form-label {
  display: block;
  font-weight: var(--agt-font-weight-semibold);
  color: var(--agt-text-icons-tx-brand-main);
  margin-bottom: var(--agt-spacing-xs);
  font-size: var(--agt-font-size-14);
}

.form-label__required { color: var(--agt-background-bg-error-main); }

.form-input,
.form-textarea {
  width: 100%;
  padding: var(--agt-spacing-md) var(--agt-spacing-lg);
  border: 1px solid var(--agt-utility-grey-500);
  border-radius: var(--agt-roundness-main);
  font-family: inherit;
  font-size: var(--agt-font-size-14);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-textarea {
  resize: vertical;
  min-height: var(--agt-min-max-system-80px);
}

.form-input:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--agt-background-bg-brand);
  box-shadow: var(--agt-focused-primary);
}

.form-input--error { border-color: var(--agt-background-bg-error-main); }

.form-hint {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-base-second);
  margin-top: var(--agt-spacing-2xs);
}

.char-counter {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-placeholder);
  text-align: left;
  margin-top: var(--agt-spacing-2xs);
}

.actions {
  display: flex;
  gap: var(--agt-spacing-lg);
  margin-top: var(--agt-spacing-2xl);
  padding-top: var(--agt-spacing-xl);
  border-top: 1px solid var(--agt-utility-grey-200);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--agt-spacing-md) var(--agt-spacing-2xl);
  font-size: var(--agt-font-size-14);
  font-weight: var(--agt-font-weight-semibold);
  border-radius: var(--agt-roundness-main);
  cursor: pointer;
  text-decoration: none;
  transition: background-color 0.2s, border-color 0.2s;
  border: none;
  flex: 1;
}

.btn--primary {
  background-color: var(--agt-background-bg-brand);
  color: var(--agt-background-bg-base-white);
}

.btn--primary:disabled {
  background-color: var(--agt-background-bg-disabled);
  cursor: not-allowed;
}

.btn--primary:hover:not(:disabled) {
  background-color: var(--agt-background-bg-brand-hover);
}

.btn--secondary {
  background-color: var(--agt-background-bg-base-white);
  color: var(--agt-background-bg-brand);
  border: 1px solid var(--agt-background-bg-brand);
}

.btn--secondary:hover { background-color: var(--agt-background-bg-brand-light); }

.btn--warning { background-color: #f59e0b; color: #fff; }
.btn--warning:hover { background-color: #d97706; }

.notice {
  text-align: center;
  padding: var(--agt-spacing-2xl);
}

.spinner {
  width: var(--agt-spacing-5xl);
  height: var(--agt-spacing-5xl);
  border: var(--agt-roundness-main) solid var(--agt-utility-grey-400);
  border-top-color: var(--agt-background-bg-brand);
  border-radius: var(--agt-roundness-full);
  animation: spin 1s linear infinite;
  margin: 0 auto var(--agt-spacing-xl);
}

@keyframes spin { to { transform: rotate(360deg); } }

.info-note {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-base-second);
  margin-top: var(--agt-spacing-lg);
  text-align: center;
  padding: var(--agt-spacing-sm);
  background: var(--agt-background-bg-base-secondary);
  border-radius: var(--agt-roundness-main);
}

.info-note--warning {
  color: var(--agt-text-icons-tx-warning);
  background: var(--agt-background-bg-warning-light);
}

.info-note--info {
  color: var(--agt-text-icons-tx-brand-main);
  background: var(--agt-utility-light-blue-200);
  border: 1px solid var(--agt-utility-light-blue-300);
  font-weight: var(--agt-font-weight-semibold);
}

.debug-toggle {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-base-second);
  cursor: pointer;
  margin-top: var(--agt-spacing-lg);
  text-decoration: underline;
}

.debug-panel {
  margin-top: var(--agt-spacing-lg);
  padding: var(--agt-spacing-md);
  background: var(--agt-background-bg-warning-on);
  border-radius: var(--agt-roundness-main);
  font-size: var(--agt-font-size-10);
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: var(--agt-min-max-system-160px);
  overflow-y: auto;
  display: none;
}

.debug-panel--visible { display: block; }

.char-count {
  font-size: var(--agt-font-size-12);
  color: var(--agt-text-icons-tx-base-tertiary);
  font-weight: normal;
}

.issue-item {
  display: inline-block;
  background-color: var(--agt-background-bg-warning-light);
  color: var(--agt-text-icons-tx-warning);
  padding: var(--agt-corner-small) var(--agt-spacing-sm);
  border-radius: var(--agt-corner-small);
  font-size: var(--agt-font-size-12);
  margin: var(--agt-corner-small) var(--agt-spacing-2xs) var(--agt-corner-small) 0;
}

.feedback-box {
  margin: var(--agt-spacing-xl) 0;
  padding: var(--agt-spacing-lg) var(--agt-spacing-xl);
  border-radius: var(--agt-roundness-main);
  border-left: 4px solid #e65100;
  background: #fff8f0;
}

.feedback-box--rejected {
  border-left-color: var(--agt-background-bg-error-main);
  background: var(--agt-background-bg-error-light);
}

.feedback-box__header {
  font-weight: var(--agt-font-weight-bold);
  font-size: var(--agt-font-size-12);
  color: #e65100;
  margin-bottom: var(--agt-spacing-xs);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.feedback-box--rejected .feedback-box__header { color: var(--agt-text-icons-tx-error); }

.feedback-box__text {
  font-size: var(--agt-font-size-14);
  color: var(--agt-text-icons-tx-base-title);
  line-height: 1.6;
}

.status-badge {
  display: inline-block;
  padding: var(--agt-corner-small) var(--agt-spacing-lg);
  border-radius: var(--agt-roundness-full);
  font-size: var(--agt-font-size-12);
  font-weight: var(--agt-font-weight-semibold);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.status-badge--in-review { background-color: var(--agt-background-bg-warning-light); color: var(--agt-text-icons-tx-warning); }
.status-badge--approved { background-color: var(--agt-background-bg-success-light); color: var(--agt-text-icons-tx-success); }
.status-badge--published { background-color: var(--agt-utility-light-blue-200); color: var(--agt-text-icons-tx-brand-main); }
.status-badge--scheduled { background-color: var(--agt-utility-light-blue-200); color: var(--agt-text-icons-tx-brand-main); }
.status-badge--changes-requested { background-color: #fff3e0; color: #e65100; }
.status-badge--rejected { background-color: var(--agt-background-bg-error-light); color: var(--agt-text-icons-tx-error); }

.rejection-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--agt-spacing-2xs);
  padding: var(--agt-corner-small) var(--agt-spacing-sm);
  border-radius: var(--agt-roundness-full);
  font-size: var(--agt-font-size-12);
  font-weight: var(--agt-font-weight-semibold);
  background: var(--agt-background-bg-error-light);
  color: var(--agt-text-icons-tx-error);
  margin-left: var(--agt-spacing-sm);
}

.priority-urgent { color: var(--agt-text-icons-tx-error); font-weight: var(--agt-font-weight-semibold); }
.priority-standard { color: var(--agt-background-bg-brand); font-weight: var(--agt-font-weight-semibold); }
.priority-future-deployment { color: var(--agt-utility-dark-blue-800); font-weight: var(--agt-font-weight-semibold); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
/* eslint-disable no-use-before-define */
/* eslint-disable no-plusplus */

const CONFIG = Object.freeze({
  proxyUrl: 'https://23750-539copperbadger.adobeioruntime.net/api/v1/web/default/send-for-review-proxy',
  emailStorageKey: 'sfr_user_email',
  defaultRef: 'main',
  logoPath: './assets/agilent-logo.png',
  pluginTitle: 'ContentFlow — Send For Review',
  seo: {
    titleMaxLength: 60,
    descriptionMaxLength: 200,
  },
});

const STATUS = Object.freeze({
  LOADING: 'loading',
  READY: 'ready',
  READY_MINIMAL: 'ready-minimal',
  IN_REVIEW: 'in-review',
  COMPLETE: 'complete',
  SUCCESS: 'success',
  ERROR: 'error',
  NONE: 'none',
  BLOCKED: 'blocked',
  CHANGES_REQUESTED: 'changes-requested',
  REJECTED: 'rejected',
});

const BLOCKED_STATUSES = ['in-review', 'approved', 'published', 'scheduled'];
const RESUBMIT_STATUSES = ['changes-requested'];

const PRIORITIES = Object.freeze({
  STANDARD: 'Standard',
  URGENT: 'Urgent',
  FUTURE_DEPLOYMENT: 'Future Deployment',
});

const DEFAULT_PRIORITY = PRIORITIES.STANDARD;

const state = {
  context: null,
  analysis: null,
  debugLogs: [],
  daSDKInstance: null,
};

function log(message, data = null) {
  const timestamp = new Date().toISOString().slice(11, 19);
  const logEntry = data
    ? `[${timestamp}] ${message}: ${JSON.stringify(data).slice(0, 200)}`
    : `[${timestamp}] ${message}`;
  console.log(`[SFR ${timestamp}]`, message, data || '');
  state.debugLogs.push(logEntry);
}

function formatDate(isoString) {
  try { return new Date(isoString).toLocaleString(); } catch { return isoString; }
}

function isValidEmail(email) {
  return Boolean(email && email.includes('@') && email.includes('.'));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function normalizePath(path) {
  return path.replace(/^\/+/, '').replace(/\.html?$/, '').replace(/\/index$/, '') || 'index';
}

function isIndexPage(path) {
  const normalized = normalizePath(path);
  return normalized === 'index' || normalized === '';
}

function buildUrlPath(path) {
  return isIndexPage(path) ? '/' : `/${normalizePath(path)}`;
}

function normalizeStatus(raw) {
  if (!raw || typeof raw !== 'string') return 'none';
  const s = raw.toLowerCase().trim().replace(/[\s_]+/g, '-');
  if (s === 'rejected' || s === 'not-relevant') return 'rejected';
  if (s.includes('changes')) return 'changes-requested';
  if (s === 'approved') return 'approved';
  if (s === 'in-review') return 'in-review';
  if (s === 'published') return 'published';
  if (s === 'scheduled') return 'scheduled';
  if (s === 'complete') return 'complete';
  if (s === 'authoring' || s === 'draft') return 'authoring';
  if (s && s !== 'none') console.warn('[SFR] Unexpected status value:', raw, '→', s);
  return 'none';
}

function getStatusLabel(status) {
  const map = {
    authoring: 'Authoring', 'in-review': 'In Review', approved: 'Approved',
    'changes-requested': 'Changes Requested', rejected: 'Not Relevant',
    published: 'Published', scheduled: 'Scheduled', complete: 'Complete',
  };
  return map[status] || status || 'Unknown';
}

function cleanFeedback(text) {
  if (!text) return '';
  return text.replace(/^Proof Comment:\s*/i, '').trim();
}

const storage = {
  getEmail() { try { return localStorage.getItem(CONFIG.emailStorageKey) || ''; } catch { return ''; } },
  saveEmail(email) { try { localStorage.setItem(CONFIG.emailStorageKey, email); } catch {} },
};

async function checkReviewStatus(ctx) {
  log('Checking review status via proxy');
  try {
    const response = await fetch(CONFIG.proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { action: 'check-status', pageIdentifier: ctx.pageIdentifier, org: ctx.org, site: ctx.site, ref: ctx.ref, path: ctx.path } }),
    });
    if (!response.ok) { log('Status check failed', { status: response.status }); return null; }
    const data = await response.json();
    log('Status response', data);
    if (data.message && typeof data.message === 'string') {
      try {
        const fixedMessage = data.message.replace(/"status":\s*([a-zA-Z-]+),/g, '"status": "$1",');
        const parsedMessage = JSON.parse(fixedMessage);
        log('Parsed message from response', parsedMessage);
        return parsedMessage;
      } catch (parseError) {
        log('Failed to parse message field', parseError.message);
        return data;
      }
    }
    return data;
  } catch (error) {
    log('Status check error', error.message);
    return null;
  }
}

async function submitReview(payload) {
  log('Submitting review via proxy', { pageIdentifier: payload.pageIdentifier });
  const response = await fetch(CONFIG.proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: payload }),
  });
  if (!response.ok) {
    const errorText = await response.text();
    throw new Error(`HTTP ${response.status}: ${errorText}`);
  }
  const result = await response.json();
  if (!result.success) throw new Error(result.error || 'Submission failed');
  return true;
}

function getContextFromURLParams() {
  const params = new URLSearchParams(window.location.search);
  const ctx = {
    ref: params.get('ref') || '',
    site: params.get('site') || params.get('repo') || '',
    org: params.get('org') || params.get('owner') || '',
    path: params.get('path') || '',
  };
  log('URL params context', ctx);
  return ctx;
}

function getContextFromReferrer() {
  if (!document.referrer) return null;
  try {
    const url = new URL(document.referrer);
    log('Referrer URL', document.referrer);
    const daMatch = url.href.match(/da\.live\/edit#\/([^/]+)\/([^/]+)\/(.*)?/);
    if (daMatch) {
      const pagePath = daMatch[3] || 'index';
      return { org: daMatch[1], site: daMatch[2], path: pagePath, ref: 'main', source: 'da.live-referrer' };
    }
    const aemMatch = url.host.match(/^([^-]+)--([^-]+)--([^.]+)\.aem\.(page|live)$/);
    if (aemMatch) {
      const pagePath = url.pathname.replace(/^\//, '') || 'index';
      return { ref: aemMatch[1], site: aemMatch[2], org: aemMatch[3], path: pagePath, source: 'aem-referrer' };
    }
  } catch (error) { log('Referrer parse error', error.message); }
  return null;
}

async function getContextFromDASDK() {
  try {
    const DA_SDK = await import('https://da.live/nx/utils/sdk.js');
    const sdk = await DA_SDK.default;
    state.daSDKInstance = sdk;
    log('DA SDK raw context', sdk?.context);
    if (sdk?.context) {
      const sdkPath = sdk.context.path || '';
      return { org: sdk.context.org || sdk.context.owner || '', site: sdk.context.repo || '', ref: sdk.context.ref || 'main', path: sdkPath, email: sdk.context.email || sdk.context.user?.email || '', source: 'da-sdk' };
    }
  } catch (error) { log('DA SDK error', error.message); }
  return null;
}

function detectPluginOrigin() {
  const pluginHost = window.location.host;
  const aemMatch = pluginHost.match(/^(.+)\.aem\.(page|live)$/);
  if (aemMatch) {
    const parts = aemMatch[1].split('--');
    if (parts.length >= 3) return { pluginRef: parts[0], pluginSite: parts[1], pluginOrg: parts.slice(2).join('--') };
  }
  return null;
}

async function getFullContext() {
  const urlParams = getContextFromURLParams();
  const referrerCtx = getContextFromReferrer();
  const sdkCtx = await getContextFromDASDK();
  const pluginOrigin = detectPluginOrigin();
  log('Context sources', { urlParams, referrerCtx, sdkCtx, pluginOrigin });

  let path = sdkCtx?.path || referrerCtx?.path || urlParams.path || '';
  if (!path) path = 'index';
  if (path.includes('tools/send-for-review') || path.includes('send-for-review')) {
    log('Path contains plugin path, falling back', { originalPath: path });
    path = referrerCtx?.path || urlParams.path || 'index';
  }
  path = normalizePath(path);
  log('Final path after normalization', path);

  const ctx = {
    ref: sdkCtx?.ref || referrerCtx?.ref || urlParams.ref || CONFIG.defaultRef,
    site: sdkCtx?.site || referrerCtx?.site || urlParams.site || '',
    org: sdkCtx?.org || referrerCtx?.org || urlParams.org || '',
    path,
    email: sdkCtx?.email || '',
    source: sdkCtx?.source || referrerCtx?.source || 'url-params',
    ...pluginOrigin,
  };

  ctx.host = `${ctx.ref}--${ctx.site}--${ctx.org}.aem.page`;
  const urlPath = buildUrlPath(ctx.path);
  ctx.previewUrl = `https://${ctx.host}${urlPath}`;
  ctx.liveUrl = `https://${ctx.ref}--${ctx.site}--${ctx.org}.aem.live${urlPath}`;
  ctx.plainUrl = `https://${ctx.host}/${ctx.path}.plain.html`;

  if (ctx.pluginRef && ctx.pluginSite === ctx.site && ctx.pluginOrg === ctx.org) {
    ctx.sameOriginHost = `${ctx.pluginRef}--${ctx.site}--${ctx.org}.aem.page`;
    ctx.sameOriginPreviewUrl = `https://${ctx.sameOriginHost}${urlPath}`;
    ctx.sameOriginPlainUrl = `https://${ctx.sameOriginHost}/${ctx.path}.plain.html`;
  }

  ctx.daContentUrl = `https://content.da.live/${ctx.org}/${ctx.site}/${ctx.path}`;
  ctx.daSourceUrl = `https://admin.da.live/source/${ctx.org}/${ctx.site}/${ctx.path}.html`;
  ctx.env = 'page';
  ctx.pageIdentifier = `${ctx.org}/${ctx.site}/${ctx.path}`;
  log('Final context', ctx);
  return ctx;
}

async function fetchFromSDK() {
  if (!state.daSDKInstance?.context) return null;
  try {
    log('Trying DA SDK content');
    const doc = state.daSDKInstance.context.doc || state.daSDKInstance.context.document;
    if (doc) {
      const html = typeof doc === 'string' ? doc : doc.outerHTML || doc.innerHTML;
      if (html) { log('DA SDK content found'); return { html, source: 'da-sdk', isPlain: true }; }
    }
  } catch (error) { log('DA SDK content error', error.message); }
  return null;
}

async function fetchFromUrl(url, source, options = {}) {
  try {
    log(`Trying ${source}`, url);
    const fetchOptions = { cache: 'no-store', ...(options.credentials && { credentials: options.credentials }) };
    const response = await fetch(url, fetchOptions);
    if (response.ok) {
      const html = await response.text();
      log(`${source} success`, { length: html.length });
      return { html, source, isPlain: options.isPlain ?? true };
    }
    log(`${source} returned`, response.status);
  } catch (error) { log(`${source} error`, error.message); }
  return null;
}

async function fetchContent(ctx) {
  const sdkContent = await fetchFromSDK();
  if (sdkContent) return sdkContent;

  const strategies = [];
  if (ctx.sameOriginPreviewUrl) strategies.push({ url: ctx.sameOriginPreviewUrl, source: 'same-origin-full', isPlain: false });
  strategies.push({ url: ctx.previewUrl, source: 'full-page', isPlain: false });
  if (ctx.sameOriginPlainUrl) strategies.push({ url: ctx.sameOriginPlainUrl, source: 'same-origin-plain', isPlain: true });
  strategies.push(
    { url: ctx.daContentUrl, source: 'content.da.live', isPlain: true },
    { url: ctx.daSourceUrl, source: 'admin.da.live', isPlain: true, credentials: 'include' },
    { url: ctx.plainUrl, source: 'plain.html', isPlain: true },
  );

  log('Fetch strategies', strategies.map((s) => s.source));
  for (const strategy of strategies) {
    const content = await fetchFromUrl(strategy.url, strategy.source, strategy);
    if (content) { log('Content fetched successfully', { source: content.source }); return content; }
  }
  log('All fetch strategies failed');
  return null;
}

function analyzeContentMetrics(root) {
  const text = root?.textContent || '';
  const cleanText = text.replace(/\s+/g, ' ').trim();
  const words = cleanText.split(/\s+/).filter((w) => w.length > 0);
  const sentences = cleanText.split(/[.!?]+/).filter((s) => s.trim().length > 0);
  return {
    wordCount: words.length, characterCount: cleanText.length,
    characterCountNoSpaces: cleanText.replace(/\s/g, '').length,
    sentenceCount: sentences.length, paragraphCount: root.querySelectorAll('p').length,
    avgWordsPerSentence: sentences.length > 0 ? Math.round(words.length / sentences.length) : 0,
    readingTimeMinutes: Math.ceil(words.length / 200) || 1,
  };
}

function analyzeHeadings(root) {
  const headings = [];
  const counts = { h1: 0, h2: 0, h3: 0, h4: 0, h5: 0, h6: 0 };
  const issues = [];
  root.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach((h) => {
    const level = parseInt(h.tagName.charAt(1), 10);
    const tag = h.tagName.toLowerCase();
    counts[tag]++;
    headings.push({ level, tag, text: h.textContent?.trim() || '', id: h.id || '' });
  });
  if (counts.h1 === 0) issues.push('Required: Add an attribute to the Total Headings field');
  else if (counts.h1 > 1) issues.push(`Multiple H1 headings found (${counts.h1})`);
  let lastLevel = 0;
  headings.forEach((h) => {
    if (h.level > lastLevel + 1 && lastLevel > 0) issues.push(`Skipped heading level: H${lastLevel} to H${h.level}`);
    lastLevel = h.level;
  });
  return { headings, counts, total: headings.length, issues, isValid: issues.length === 0 };
}

function analyzeBlocks(root) {
  const sections = root.querySelectorAll(':scope > div');
  const blocks = [];
  const blockSummary = {};
  sections.forEach((section, index) => {
    section.querySelectorAll(':scope > div[class]').forEach((block) => {
      const name = block.classList[0] || 'unknown';
      const textContent = block.textContent?.trim() || '';
      blocks.push({ name, section: index + 1, variants: Array.from(block.classList).slice(1), contentPreview: textContent.length > 100 ? `${textContent.substring(0, 100)}...` : textContent });
      blockSummary[name] = (blockSummary[name] || 0) + 1;
    });
  });
  return { totalBlocks: blocks.length, totalSections: sections.length, blocks, blockNames: [...new Set(blocks.map((b) => b.name))], blockSummary };
}

function analyzeSEO(doc) {
  const title = doc.querySelector('title')?.textContent?.trim() || '';
  const description = doc.querySelector('meta[name="description"]')?.content?.trim() || '';
  const canonical = doc.querySelector('link[rel="canonical"]')?.href || '';
  const robots = doc.querySelector('meta[name="robots"]')?.content || '';
  const lang = doc.documentElement?.lang || doc.querySelector('html')?.lang || '';
  const issues = [];
  if (!title) issues.push('Missing title');
  else if (title.length > CONFIG.seo.titleMaxLength) issues.push(`Title exceeds recommended length (${title.length} chars, maximum of ${CONFIG.seo.titleMaxLength} characters)`);
  if (!description) issues.push('Missing description');
  else if (description.length > CONFIG.seo.descriptionMaxLength) issues.push(`Meta description is recommended to be under ${CONFIG.seo.descriptionMaxLength} characters for optimal display (currently ${description.length} chars)`);
  if (!canonical) issues.push('Missing canonical URL');
  if (!lang) issues.push('Required: Add an attribute to the Language field');
  return { title: { content: title, length: title.length }, metaDescription: { content: description, length: description.length }, canonical, robots, lang, issues };
}

function analyzeOpenGraph(doc) {
  const og = {}, twitter = {}, issues = [];
  doc.querySelectorAll('meta[property^="og:"]').forEach((meta) => { og[meta.getAttribute('property').replace('og:', '')] = meta.content; });
  doc.querySelectorAll('meta[name^="twitter:"]').forEach((meta) => { twitter[meta.getAttribute('name').replace('twitter:', '')] = meta.content; });
  if (!og.title) issues.push('Missing og:title');
  if (!og.description) issues.push('Missing og:description');
  else if (og.description.length > 200) issues.push(`Open Graph description is recommended to be under 200 characters (currently ${og.description.length} chars)`);
  if (!og.image) issues.push('Missing og:image');
  const hasSocialMeta = Object.keys(og).length > 0 || Object.keys(twitter).length > 0;
  return { openGraph: og, twitter, issues, score: !hasSocialMeta ? 0 : (issues.length === 0 ? 100 : 50), hasSocialMeta };
}

function analyzeAccessibility(root) {
  const images = root.querySelectorAll('img');
  let withAlt = 0, withoutAlt = 0, decorative = 0;
  images.forEach((img) => {
    const alt = img.getAttribute('alt');
    if (alt === '') decorative++;
    else if (alt) withAlt++;
    else withoutAlt++;
  });
  const total = images.length;
  const altCoveragePercent = total > 0 ? Math.round(((withAlt + decorative) / total) * 100) : 100;
  const issues = [];
  if (withoutAlt > 0) issues.push(`${withoutAlt} images missing alt text. The Alt text field is required.`);
  return { images: { total, withAlt, withoutAlt, decorative, altCoveragePercent }, aria: { labels: root.querySelectorAll('[aria-label]').length, roles: root.querySelectorAll('[role]').length }, issues, score: altCoveragePercent };
}

function analyzeLinks(root) {
  const links = root.querySelectorAll('a[href]');
  let internal = 0, external = 0, mailto = 0, tel = 0;
  const externalLinks = [];
  links.forEach((link) => {
    const href = link.getAttribute('href');
    if (!href) return;
    if (href.startsWith('mailto:')) mailto++;
    else if (href.startsWith('tel:')) tel++;
    else if (href.startsWith('http') && !href.includes(window.location.host)) { external++; externalLinks.push({ href, text: link.textContent?.trim() || '' }); }
    else internal++;
  });
  return { total: links.length, internal, external, buttons: root.querySelectorAll('button, a.button, .button').length, mailto, tel, externalLinks };
}

function getAnalytics() {
  return { timestamp: new Date().toISOString(), timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, userAgent: navigator.userAgent, language: navigator.language, screen: { width: window.screen?.width || 0, height: window.screen?.height || 0, colorDepth: window.screen?.colorDepth || 0 }, viewport: { width: window.innerWidth, height: window.innerHeight } };
}

function analyzeDocument(doc, isPlain) {
  const root = isPlain ? doc.body : (doc.querySelector('main') || doc.body);
  return { contentMetrics: analyzeContentMetrics(root), headingStructure: analyzeHeadings(root), blocks: analyzeBlocks(root), seo: analyzeSEO(doc), openGraph: analyzeOpenGraph(doc), accessibility: analyzeAccessibility(root), links: analyzeLinks(root), analytics: getAnalytics() };
}

    openGraph: { openGraph: {}, twitter: {}, issues: [], score: 0, hasSocialMeta: false },

function buildPayload(ctx, analysis, email, notes = '', priority = DEFAULT_PRIORITY) {
  const name = ctx.path.split('/').pop() || 'index';

    ${feedback ? `<div class="feedback-box feedback-box--rejected"><div class="feedback-box__header">Reviewer Feedback</div><div class="feedback-box__text">${escapeHtml(feedback)}</div></div>` : ''}
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Page:</span><span class="detail-row__value">${escapeHtml(ctx.path)}</span></div>
      <div class="detail-row"><span class="detail-row__label">Status:</span><span class="detail-row__value"><span class="status-badge status-badge--rejected">Not Relevant</span></span></div>
    </div>
    <div class="actions">
      <a href="${ctx.previewUrl}" target="_blank" class="btn btn--secondary">View Preview</a>
      <button class="btn btn--primary" disabled>Submit for Review</button>
    </div>
    <p class="info-note">To resubmit, create a new project via the Product Launch form.</p>`;
}

function renderReadyForm(title, name, analysis) {
  const storedEmail = storage.getEmail();
  const seoTitle = analysis?.seo?.title?.content || '';
  const seoTitleLength = analysis?.seo?.title?.length || 0;
  const seoDescription = analysis?.seo?.metaDescription?.content || '';
  const seoDescLength = analysis?.seo?.metaDescription?.length || 0;
  const seoIssues = analysis?.seo?.issues || [];
  const seoIssuesHtml = seoIssues.length > 0 ? seoIssues.map((i) => `<span class="issue-item">${escapeHtml(i)}</span>`).join('') : '<span class="detail-row__value--success">None</span>';
  const headingIssues = analysis?.headingStructure?.issues || [];
  const headingIssuesHtml = headingIssues.length > 0 ? headingIssues.map((i) => `<span class="issue-item">${escapeHtml(i)}</span>`).join('') : '<span class="detail-row__value--success">None</span>';
  const blocks = analysis?.blocks?.blockNames?.length > 0 ? analysis.blocks.blockNames.join(', ') : 'None';
  return `
    <p class="status-message status-message--loading">Ready to submit for review.</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">SEO Title (max 60):</span><span class="detail-row__value">${escapeHtml(seoTitle || name)} <span class="char-count">(${seoTitleLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Name:</span><span class="detail-row__value">${escapeHtml(name)}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Description:</span><span class="detail-row__value ${seoDescLength > CONFIG.seo.descriptionMaxLength ? 'detail-row__value--warning' : ''}">${seoDescription ? escapeHtml(seoDescription) : '<em>No description</em>'} <span class="char-count">(${seoDescLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Blocks:</span><span class="detail-row__value">${analysis?.blocks?.totalBlocks || 0} (${escapeHtml(blocks)})</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">SEO Issues:</span><span class="detail-row__value ${seoIssues.length > 0 ? 'detail-row__value--warning' : ''}">${seoIssuesHtml}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Heading Issues:</span><span class="detail-row__value ${headingIssues.length > 0 ? 'detail-row__value--warning' : ''}">${headingIssuesHtml}</span></div>
    </div>
    <div class="form-section">
      <div class="form-group"><label class="form-label">Your Email <span class="form-label__required">*</span></label><input type="email" id="email-input" class="form-input" placeholder="Enter your email address" value="${escapeHtml(storedEmail)}" required><div class="form-hint">Required for review tracking</div></div>
      <div class="form-group"><label class="form-label">Priority <span class="form-label__required">*</span></label><select id="priority-select" class="form-input">${renderPriorityOptions()}</select><div class="form-hint">Select the priority level for this review</div></div>
      <div class="form-group"><label class="form-label">Notes / Instructions (Optional)</label><textarea id="notes-input" class="form-textarea" placeholder="Enter any additional notes or instructions for this review..."></textarea><div class="char-counter"><span id="notes-char-count">0</span> characters</div></div>
    </div>
    <p class="info-note">Please preview the page before sending for review</p>
    <div class="actions"><button id="submit-btn" class="btn btn--primary">Submit for Review</button></div>`;
}

function renderReadyMinimal(name) {
  const ctx = state.context;
  const storedEmail = storage.getEmail();
  return `
    <p class="status-message status-message--loading">Ready to submit for review.</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">Page:</span><span class="detail-row__value">${escapeHtml(name)}</span></div>
      <div class="detail-row"><span class="detail-row__label">Path:</span><span class="detail-row__value">${buildUrlPath(ctx.path)}</span></div>
    </div>
    <p class="info-note info-note--warning">⚠️ Page analysis unavailable (cross-origin). Review tracking will still work.</p>
    <div class="form-section">
      <div class="form-group"><label class="form-label">Your Email <span class="form-label__required">*</span></label><input type="email" id="email-input" class="form-input" placeholder="Enter your email address" value="${escapeHtml(storedEmail)}" required><div class="form-hint">Required for review tracking</div></div>
      <div class="form-group"><label class="form-label">Priority <span class="form-label__required">*</span></label><select id="priority-select" class="form-input">${renderPriorityOptions()}</select><div class="form-hint">Select the priority level for this review</div></div>
      <div class="form-group"><label class="form-label">Notes / Instructions (Optional)</label><textarea id="notes-input" class="form-textarea" placeholder="Enter any additional notes..."></textarea></div>
    </div>
    <p class="info-note">Please preview the page before sending for review</p>
    <div class="actions"><button id="submit-btn" class="btn btn--primary">Submit for Review</button></div>`;
}

function renderSuccess(payload) {
  const seoIssues = payload.seo?.issues || [];
  const seoIssuesHtml = seoIssues.length > 0 ? seoIssues.map((i) => `<span class="issue-item">${escapeHtml(i)}</span>`).join('') : '<span class="detail-row__value--success">None</span>';
  const headingIssues = payload.headingStructure?.issues || [];
  const headingIssuesHtml = headingIssues.length > 0 ? headingIssues.map((i) => `<span class="issue-item">${escapeHtml(i)}</span>`).join('') : '<span class="detail-row__value--success">None</span>';
  const blocks = payload.blocks?.blockNames?.length > 0 ? payload.blocks.blockNames.join(', ') : 'None';
  const description = payload.seo?.metaDescription?.content || '';
  const descLength = payload.seo?.metaDescription?.length || 0;
  return `
    <p class="status-message status-message--success">Review request submitted successfully!</p>
    <div class="page-details">
      <div class="detail-row"><span class="detail-row__label">SEO Title (max 60):</span><span class="detail-row__value">${escapeHtml(payload.title)} <span class="char-count">(${payload.seo?.title?.length || 0} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Name:</span><span class="detail-row__value">${escapeHtml(payload.name)}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Description:</span><span class="detail-row__value">${description ? escapeHtml(description) : '<em>No description</em>'} <span class="char-count">(${descLength} chars)</span></span></div>
      <div class="detail-row"><span class="detail-row__label">Submitted By:</span><span class="detail-row__value">${escapeHtml(payload.submittedBy)}</span></div>
      <div class="detail-row"><span class="detail-row__label">Submission Date:</span><span class="detail-row__value">${formatDate(payload.reviewSubmissionDate)}</span></div>
      ${payload.priority ? `<div class="detail-row"><span class="detail-row__label">Priority:</span><span class="detail-row__value"><span class="${getPriorityClass(payload.priority)}">${escapeHtml(payload.priority)}</span></span></div>` : ''}
      ${payload.notes ? `<div class="detail-row detail-row--full-width"><span class="detail-row__label">Notes:</span><span class="detail-row__value">${escapeHtml(payload.notes)}</span></div>` : ''}
      <div class="detail-row"><span class="detail-row__label">Blocks:</span><span class="detail-row__value">${payload.blocks?.totalBlocks || 0} (${escapeHtml(blocks)})</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">SEO Issues:</span><span class="detail-row__value ${seoIssues.length > 0 ? 'detail-row__value--warning' : ''}">${seoIssuesHtml}</span></div>
      <div class="detail-row detail-row--full-width"><span class="detail-row__label">Heading Issues:</span><span class="detail-row__value ${headingIssues.length > 0 ? 'detail-row__value--warning' : ''}">${headingIssuesHtml}</span></div>
    </div>
    <div class="actions"><a href="${payload.previewUrl}" target="_blank" class="btn btn--secondary">View Preview</a></div>
    <p class="info-note">Review request has been recorded. Use "Get Page Current Status" to check progress.</p>`;
}

function render(viewState) {
  const app = document.getElementById('app');
  let content = '';
  switch (viewState.status) {
    case STATUS.LOADING: content = renderLoading(viewState.message); break;
    case STATUS.ERROR: content = renderError(viewState.message); break;
    case STATUS.IN_REVIEW: content = renderInReview(viewState.data); break;
    case STATUS.BLOCKED: content = renderBlocked(viewState.data); break;
    case STATUS.CHANGES_REQUESTED: content = renderChangesRequested(viewState); break;
    case STATUS.REJECTED: content = renderRejected(viewState.data); break;
    case STATUS.COMPLETE: content = renderComplete(viewState); break;
    case STATUS.READY: content = renderReadyForm(viewState.title, viewState.name, viewState.analysis); break;
    case STATUS.READY_MINIMAL: content = renderReadyMinimal(viewState.name); break;
    case STATUS.SUCCESS: content = renderSuccess(viewState.payload); break;
    default: content = renderError('Unknown state');
  }
  app.innerHTML = `<div class="review-card">${renderHeader()}<div class="content">${content}</div></div>`;
  attachEventListeners();
}

function attachEventListeners() {
  document.getElementById('retry-btn')?.addEventListener('click', init);
  document.getElementById('submit-btn')?.addEventListener('click', handleSubmit);
  document.getElementById('debug-toggle')?.addEventListener('click', toggleDebugPanel);
  const notesInput = document.getElementById('notes-input');
  const notesCharCount = document.getElementById('notes-char-count');
  if (notesInput && notesCharCount) {
    notesInput.addEventListener('input', () => { notesCharCount.textContent = notesInput.value.length; });
  }
}

function toggleDebugPanel() {
  const panel = document.getElementById('debug-panel');
  if (panel) { panel.classList.toggle('debug-panel--visible'); panel.textContent = state.debugLogs.join('\n'); }
}

async function handleSubmit() {
  const emailInput = document.getElementById('email-input');
  const notesInput = document.getElementById('notes-input');
  const prioritySelect = document.getElementById('priority-select');
  const email = emailInput?.value?.trim() || '';
  const notes = notesInput?.value?.trim() || '';
  const priority = prioritySelect?.value || DEFAULT_PRIORITY;
  if (!isValidEmail(email)) { emailInput?.focus(); emailInput?.classList.add('form-input--error'); return; }
  storage.saveEmail(email);
  render({ status: STATUS.LOADING, message: 'Submitting review request…' });
  try {
    const payload = buildPayload(state.context, state.analysis, email, notes, priority);
    await submitReview(payload);
    render({ status: STATUS.SUCCESS, payload });
  } catch (error) {
    log('Submit error', error.message);
    render({ status: STATUS.ERROR, message: `Failed to submit: ${error.message}` });
  }
}

async function init() {
  render({ status: STATUS.LOADING, message: 'Initializing…' });
  try {
    state.context = await getFullContext();
    if (!state.context.org || !state.context.site) {
      render({ status: STATUS.ERROR, message: 'Could not determine page context. Make sure you have a page open.' });
      return;
    }
    render({ status: STATUS.LOADING, message: 'Checking review status…' });
    const statusResponse = await checkReviewStatus(state.context);
    const currentStatus = statusResponse?.status ? normalizeStatus(statusResponse.status) : 'none';
    log('Normalized status', { raw: statusResponse?.status, normalized: currentStatus });

    if (BLOCKED_STATUSES.includes(currentStatus)) {
      render({ status: STATUS.BLOCKED, data: statusResponse }); return;
    }
    if (currentStatus === 'rejected') {
      render({ status: STATUS.REJECTED, data: statusResponse }); return;
    }
    if (RESUBMIT_STATUSES.includes(currentStatus)) {
      render({ status: STATUS.LOADING, message: 'Analyzing page for resubmission…' });
      const content = await fetchContent(state.context);
      const name = state.context.path.split('/').pop() || 'index';
      let title = name;
      if (content?.html) {
        const doc = new DOMParser().parseFromString(content.html, 'text/html');
        state.analysis = analyzeDocument(doc, content.isPlain);
        title = state.analysis?.seo?.title?.content || name;
        if ((!title || title === name) && state.analysis?.headingStructure?.headings?.length) {
          const h1 = state.analysis.headingStructure.headings.find((h) => h.level === 1);
          if (h1) title = h1.text;
        }
      } else { state.analysis = createMinimalAnalysis(); }
      render({ status: STATUS.CHANGES_REQUESTED, data: statusResponse, title, name, analysis: state.analysis }); return;
    }

    render({ status: STATUS.LOADING, message: 'Analyzing page…' });
    const content = await fetchContent(state.context);
    const name = state.context.path.split('/').pop() || 'index';
    let title = name;
    if (content?.html) {
      const doc = new DOMParser().parseFromString(content.html, 'text/html');
      state.analysis = analyzeDocument(doc, content.isPlain);
      title = state.analysis?.seo?.title?.content || name;
      if ((!title || title === name) && state.analysis?.headingStructure?.headings?.length) {
        const h1 = state.analysis.headingStructure.headings.find((h) => h.level === 1);
        if (h1) title = h1.text;
      }
    } else { state.analysis = createMinimalAnalysis(); }

    if (currentStatus === 'complete') {
      render({ status: STATUS.COMPLETE, data: statusResponse, title, name, analysis: state.analysis });
    } else if (content?.html) {
      render({ status: STATUS.READY, title, name, analysis: state.analysis });
    } else {
      render({ status: STATUS.READY_MINIMAL, title, name });
    }
  } catch (error) {
    log('Init error', error.message);
    render({ status: STATUS.ERROR, message: `Error: ${error.message}` });
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
  </script>
</body>
</html>
